name: Auto Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_USER }}
        username: ${{ secrets.KUMARAN_EC2 }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull my-app
          docker stop my-app || true
          docker rm my-app || true
          docker run -d -p 80:9000 --name my-app httpd
